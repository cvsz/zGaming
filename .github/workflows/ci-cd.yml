name: zGaming CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: 22

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version omitted → automatically respects package.json "packageManager": "pnpm@10.8.1"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: PHP lint
        run: find backend -name "*.php" -exec php -l {} \;

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Secret scan
        run: |
          # High-signal scan for hardcoded secret values (avoids false positives on env var names).
          if rg -n -i \
            --glob '!**/*.md' \
            --glob '!generator/**' \
            --glob '!infra/**' \
            --glob '!scripts/**' \
            --glob '!.github/workflows/ci-cd.yml' \
            "(-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----|(?:api|secret|private)_key\\s*[:=]\\s*['\\\"][A-Za-z0-9_./+=-]{16,}['\\\"])" .; then
            echo "Potential real secret leak detected"
            exit 1
          fi
          echo "No real secrets found"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --prod || true

  test:
    runs-on: ubuntu-latest
    env:
      DB_PASS: ${{ secrets.DB_PASS }}
      MYSQL_ROOT_PASSWORD: root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MySQL with Docker Compose
        run: docker compose -f docker-compose.ci.yml up -d --wait

      - name: Install MySQL client (required for mysqladmin/mysql)
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          timeout 90s bash -c 'until mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent; do sleep 2; done'

      - name: Run migrations
        run: |
          if [ -f backend/db/wallet.sql ]; then
            mysql -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" test < backend/db/wallet.sql
          else
            echo "backend/db/wallet.sql not found - skipping migration"
          fi

      - name: Daily ledger reconciliation check
        run: |
          if [ -f scripts/reconcile-daily.php ]; then
            php scripts/reconcile-daily.php
          else
            echo "scripts/reconcile-daily.php not found - skipping reconciliation"
          fi

      - name: Run tests
        run: pnpm test

      - name: Cleanup Docker Compose services
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

  build:
    needs: [lint, security, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy (placeholder)
        run: |
          echo "Deploy step"
          # Replace with:
          # ssh deploy@server "cd /app && git pull && docker compose up -d"
