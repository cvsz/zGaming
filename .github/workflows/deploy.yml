name: Deploy Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target environment
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Build, publish, and deploy full source
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy environment
        id: deploy_env
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ github.event.inputs.environment }}"
          else
            TARGET_ENV="production"
          fi
          echo "target_env=${TARGET_ENV}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Resolve lowercase image namespace
        id: image_ns
        run: |
          set -euo pipefail
          echo "value=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_ns.outputs.value }}/zgaming-backend:${{ steps.deploy_env.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image_ns.outputs.value }}/zgaming-backend:latest

      - name: Package full source bundle
        run: |
          set -euo pipefail
          tar --exclude-vcs -czf zgaming-source-${{ steps.deploy_env.outputs.tag }}.tar.gz .

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: zgaming-source-${{ steps.deploy_env.outputs.tag }}
          path: zgaming-source-${{ steps.deploy_env.outputs.tag }}.tar.gz

      - name: Render Kubernetes manifests with image tag
        run: |
          set -euo pipefail
          mkdir -p .rendered-k8s
          cp -R infra/kubernetes/. .rendered-k8s/
          find .rendered-k8s -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 | while IFS= read -r -d '' file; do
            sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ steps.deploy_env.outputs.tag }}|g" "$file"
          done

      - name: Apply manifests
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_B64:-}" ]; then
            echo "KUBECONFIG_B64 secret is required for deployment" >&2
            exit 1
          fi
          echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
          kubectl apply -f .rendered-k8s/

      - name: Show rollout status
        run: |
          set -euo pipefail
          kubectl get deploy,sts,ds -A
