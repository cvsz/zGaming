services:
  db:
    image: mysql:8.4
    container_name: casino-db
    environment:
      MYSQL_DATABASE: test
      MYSQL_USER: casino
      MYSQL_PASSWORD: ${DB_PASS:-casino}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
