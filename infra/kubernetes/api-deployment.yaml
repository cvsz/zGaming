apiVersion: v1
kind: ConfigMap
metadata:
  name: zgaming-api-config
  labels:
    app: zgaming-api
data:
  NODE_ENV: "production"
  OTEL_SERVICE_NAME: "zgaming-api"
  HEALTHCHECK_PATH: "/health"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zgaming-api
  labels:
    app: zgaming-api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: zgaming-api
  template:
    metadata:
      labels:
        app: zgaming-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/your-org/zgaming-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: zgaming-api-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zgaming-secrets
                  key: jwt-secret
            - name: WALLET_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: zgaming-secrets
                  key: wallet-auth-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zgaming-api
spec:
  selector:
    app: zgaming-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zgaming-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zgaming-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zgaming-api-default-deny
spec:
  podSelector:
    matchLabels:
      app: zgaming-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
