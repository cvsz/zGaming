apiVersion: apps/v1
kind: Deployment
metadata:
  name: zgaming-api
  labels:
    app: zgaming-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zgaming-api
  template:
    metadata:
      labels:
        app: zgaming-api
    spec:
      containers:
        - name: gateway
          image: ghcr.io/your-org/zgaming-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zgaming-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
