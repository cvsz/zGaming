version: "3.9"

services:
  kafka:
    image: redpandadata/redpanda:latest
    command: >
      redpanda start
      --overprovisioned
      --smp 1
      --memory 1G
      --reserve-memory 0M
      --node-id 0
      --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:23
    ports:
      - "8123:8123"
      - "9000:9000"

  flink-jobmanager:
    image: flink:1.19
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    ports:
      - "8081:8081"

  flink-taskmanager:
    image: flink:1.19
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    depends_on:
      - flink-jobmanager

  triton:
    image: nvcr.io/nvidia/tritonserver:24.02-py3
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
    volumes:
      - ./triton_repo:/models
    ports:
      - "8000:8000"

  risk-engine:
    build: ../../services/risk-engine
    depends_on:
      - kafka
      - redis
      - triton
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_IN_TOPIC=ledger
      - KAFKA_OUT_TOPIC=risk-alerts
      - TRITON_URL=http://triton:8000/v2/models/risk_model/infer
      - REDIS_URL=redis://redis:6379/0

  wallet-engine:
    build: ../../services/wallet
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_TOPIC=ledger
      - REDIS_URL=redis://redis:6379/0

  api:
    build: ../../services/api
    ports:
      - "8000:8000"
    depends_on:
      - wallet-engine
      - risk-engine
